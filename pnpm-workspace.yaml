# pnpm-workspace.yaml
# Tells pnpm to look in the current folder for the project
packages:
  - '.'

overrides:
  vite: "8.0.8"
  node-gyp: "12.2.0"
  xml2js: "0.6.2"
  node-fetch: "3.3.2"
  "@electron/universal": "3.0.3"
  "@babel/runtime": "7.29.2"
  "@xmldom/xmldom@<0.8.12": "0.8.12"

patchedDependencies:
  vudio@2.1.1: patches/vudio@2.1.1.patch
  "@malept/flatpak-bundler@0.4.0": patches/@malept__flatpak-bundler@0.4.0.patch
  kuromoji@0.1.2: patches/kuromoji@0.1.2.patch
  electron-is@3.0.0: patches/electron-is@3.0.0.patch
  mdui@2.1.4: patches/mdui@2.1.4.patch

# Explicitly allow the build scripts that pnpm originally blocked
allowedBuildDependencies:
  - bufferutil
  - electron-winstaller
  - electron
  - esbuild
  - unrs-resolver
  - utf-8-validate
